<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="#050505" />
  <circle cx="256" cy="256" r="160" fill="#D4AF37" opacity="0.2" filter="url(#glow)" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="#D4AF37" stroke-width="4" opacity="0.3" />
  <text x="256" y="350" fill="#E5C158" font-family="'Times New Roman', Times, serif" font-size="300" font-weight="bold" font-style="italic" text-anchor="middle">N</text>
</svg>
